name: Scheduled Data Refresh

on:
  schedule:
    - cron: '0 11 * * *'   # 06:00 Central (CDT)
    - cron: '0 16 * * *'   # 11:00 Central (CDT)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run refresh_data.py
        run: python refresh_data.py

      - name: Commit refreshed data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add '*.csv' data_metadata.json
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore: scheduled data refresh [skip ci]"
            git push
          fi
